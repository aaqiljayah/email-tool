<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driftveil Labs — Email Outreach Tool</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230d0d0d'/%3E%3Cpolygon points='14,52 26,12 34,12 22,52' fill='%238a6010' opacity='0.4'/%3E%3Cpolygon points='20,52 32,12 40,12 28,52' fill='%23b8901f' opacity='0.65'/%3E%3Cpolygon points='27,52 39,12 47,12 35,52' fill='%23d4a830' opacity='0.95'/%3E%3Ccircle cx='49' cy='13' r='3.5' fill='%23d4a830'/%3E%3Cline x1='12' y1='52' x2='52' y2='52' stroke='%23d4a830' stroke-width='2' opacity='0.6'/%3E%3C/svg%3E">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d0d0d;
  --paper:#f5f2eb;
  --gold:#c8982a;
  --gold-light:#e8c96a;
  --gold-dim:rgba(200,152,42,0.12);
  --gold-dim2:rgba(200,152,42,0.06);
  --surface:#161410;
  --surface2:#1e1b16;
  --border:rgba(200,152,42,0.18);
  --border-dim:rgba(200,152,42,0.08);
  --text:#f5f2eb;
  --muted:rgba(245,242,235,0.45);
  --muted2:rgba(245,242,235,0.25);
  --wa-green:#37d166;
  --wa-bg:rgba(55,209,102,0.1);
  --wa-border:rgba(55,209,102,0.25);
}
body{
  background:var(--ink);color:var(--text);
  font-family:'Epilogue',sans-serif;font-weight:400;
  min-height:100vh;line-height:1.6;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:0.025;pointer-events:none;z-index:0;
}

/* LAYOUT */
.app{position:relative;z-index:1;display:grid;grid-template-columns:300px 1fr;min-height:100vh}
@media(max-width:900px){.app{grid-template-columns:1fr}}

/* SIDEBAR */
.sidebar{
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
@media(max-width:900px){.sidebar{position:relative;height:auto}}
.sidebar-header{
  padding:28px 24px 20px;
  border-bottom:1px solid var(--border-dim);
}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.logo-name{font-family:'Syne',sans-serif;font-size:0.85rem;font-weight:800;letter-spacing:0.06em;text-transform:uppercase}
.logo-sub{font-size:0.6rem;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-top:2px}
.sidebar-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:4px}
.sidebar-desc{font-size:0.78rem;color:var(--muted);line-height:1.6}

/* VARIABLES BUILDER */
.variables-section{
  padding:16px 24px;
  background:var(--surface2);
  border-bottom:1px solid var(--border-dim);
}
.variables-title{
  font-family:'Syne',sans-serif;
  font-size:0.7rem;
  font-weight:800;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:12px;
}
.variables-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}
.v-input-group{
  display:flex;
  flex-direction:column;
  gap:4px;
}
.v-input-group label{
  font-size:0.65rem;
  font-weight:600;
  color:var(--muted);
}
.v-input{
  background:rgba(0,0,0,0.3);
  border:1px solid var(--border-dim);
  border-radius:6px;
  padding:6px 10px;
  color:var(--text);
  font-size:0.75rem;
  font-family:'Epilogue',sans-serif;
}
.v-input:focus{
  outline:none;
  border-color:var(--gold);
}

.niche-list{padding:12px 24px 24px;display:flex;flex-direction:column;gap:4px}
.niche-btn{
  width:100%;text-align:left;padding:12px 14px;
  background:transparent;border:1px solid transparent;
  border-radius:8px;cursor:pointer;
  transition:all 0.2s;
  display:flex;align-items:center;gap:10px;
}
.niche-btn:hover{background:var(--gold-dim);border-color:var(--border-dim)}
.niche-btn.active{background:var(--gold-dim);border-color:var(--border)}
.niche-icon{
  width:32px;height:32px;border-radius:6px;
  background:rgba(200,152,42,0.08);border:1px solid var(--border-dim);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;
}
.niche-btn.active .niche-icon{background:rgba(200,152,42,0.18);border-color:var(--border)}
.niche-label{font-size:0.82rem;font-weight:500;color:var(--text);line-height:1.3}
.niche-sub{font-size:0.7rem;color:var(--muted)}

/* MAIN */
.main{background:var(--ink);padding:40px clamp(24px,5vw,64px)}
.welcome{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:60vh;text-align:center;gap:16px;
}
.welcome-icon{font-size:2.5rem;opacity:0.3}
.welcome-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;color:rgba(245,242,235,0.3)}
.welcome-desc{font-size:0.88rem;color:rgba(245,242,235,0.2);max-width:320px;line-height:1.7}

.email-section{display:none;animation:fadeUp 0.35s ease}
.email-section.visible{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

.section-eyebrow{
  font-size:0.65rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;
  color:var(--gold);margin-bottom:8px;
  display:flex;align-items:center;gap:8px;
}
.section-eyebrow::before{content:'';display:block;width:16px;height:1px;background:var(--gold);opacity:0.6}

.section-title{
  font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;
  margin-bottom:6px;
}
.section-meta{font-size:0.8rem;color:var(--muted);margin-bottom:24px}

/* SUB-NICHE SELECTOR PILLS */
.subniche-container{
  margin-bottom:30px;
}
.subniche-label{
  font-size:0.65rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:var(--muted);
  margin-bottom:10px;
}
.subniche-pills{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.subniche-pill{
  padding:8px 16px;
  border-radius:100px;
  background:var(--surface2);
  border:1px solid var(--border-dim);
  color:var(--muted);
  font-size:0.78rem;
  font-family:'Epilogue',sans-serif;
  cursor:pointer;
  transition:all 0.2s;
}
.subniche-pill:hover{
  border-color:var(--border);
  color:var(--text);
  background:var(--gold-dim2);
}
.subniche-pill.active{
  background:var(--gold-dim);
  border-color:var(--gold);
  color:var(--gold-light);
  font-weight:500;
}

.emails-grid{display:flex;flex-direction:column;gap:20px}

.email-card{
  background:var(--surface);border:1px solid var(--border-dim);
  border-radius:12px;overflow:hidden;
  transition:border-color 0.25s;
}
.email-card:hover{border-color:var(--border)}

.email-card-header{
  padding:18px 24px;
  border-bottom:1px solid var(--border-dim);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  cursor:pointer;
}
.email-variant-label{
  font-family:'Syne',sans-serif;font-size:0.65rem;font-weight:800;
  letter-spacing:0.12em;text-transform:uppercase;
  color:var(--gold);margin-bottom:4px;
}
.email-subject-preview{font-size:0.88rem;font-weight:500;color:var(--text)}

.email-card-actions{display:flex;gap:8px;flex-shrink:0}
.btn{
  padding:7px 14px;font-size:0.72rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
  font-family:'Syne',sans-serif;border-radius:6px;cursor:pointer;
  transition:all 0.2s;border:1px solid;
}
.btn-ghost{
  background:transparent;border-color:var(--border-dim);color:var(--muted);
}
.btn-ghost:hover{border-color:var(--border);color:var(--text);background:var(--gold-dim)}
.btn-copy{
  background:var(--gold-dim);border-color:var(--border);color:var(--gold-light);
}
.btn-copy:hover{background:rgba(200,152,42,0.22)}
.btn-copy.copied{background:rgba(61,186,111,0.12);border-color:rgba(61,186,111,0.3);color:#6ddfa0}

.email-body{
  padding:24px;
  display:none;
}
.email-body.open{display:block}

.email-meta-row{
  display:flex;align-items:baseline;gap:6px;margin-bottom:6px;font-size:0.83rem;
}
.meta-key{color:var(--muted);min-width:60px;flex-shrink:0}
.meta-val{color:var(--text);font-weight:500}

.divider{height:1px;background:var(--border-dim);margin:16px 0}

.email-text{
  font-size:0.88rem;color:rgba(245,242,235,0.7);line-height:1.85;
  white-space:pre-wrap;
  background:rgba(0,0,0,0.2);border:1px solid var(--border-dim);
  border-radius:8px;padding:20px;
  font-family:'Epilogue',sans-serif;
}

.tip-box{
  margin-top:32px;padding:18px 22px;
  background:rgba(200,152,42,0.05);border:1px solid var(--border-dim);
  border-radius:10px;
}
.tip-label{
  font-family:'Syne',sans-serif;font-size:0.65rem;font-weight:800;
  letter-spacing:0.12em;text-transform:uppercase;
  color:var(--gold);margin-bottom:8px;
}
.tip-text{font-size:0.82rem;color:var(--muted);line-height:1.75}

.section-divider{
  display:flex;align-items:center;gap:12px;margin:36px 0 20px;
}
.section-divider-line{flex:1;height:1px;background:var(--border-dim)}
.section-divider-label{
  font-family:'Syne',sans-serif;font-size:0.65rem;font-weight:800;
  letter-spacing:0.14em;text-transform:uppercase;
  color:var(--wa-green);white-space:nowrap;
}
.wa-card{
  background:var(--surface);border:1px solid rgba(37,211,102,0.15);
  border-radius:12px;overflow:hidden;
  transition:border-color 0.25s;
}
.wa-card:hover{border-color:rgba(37,211,102,0.3)}
.wa-card-header{
  padding:18px 24px;
  border-bottom:1px solid rgba(37,211,102,0.1);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  cursor:pointer;
}
.wa-variant-label{
  font-family:'Syne',sans-serif;font-size:0.65rem;font-weight:800;
  letter-spacing:0.12em;text-transform:uppercase;
  color:var(--wa-green);margin-bottom:4px;
}
.wa-preview{font-size:0.88rem;font-weight:500;color:var(--text)}
.btn-wa{
  background:rgba(37,211,102,0.08);border-color:rgba(37,211,102,0.25);color:rgba(37,211,102,0.9);
}
.btn-wa:hover{background:rgba(37,211,102,0.15)}
.btn-wa.copied{background:rgba(61,186,111,0.12);border-color:rgba(61,186,111,0.3);color:#6ddfa0}

/* TOAST */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:12px 18px;font-size:0.82rem;color:var(--text);
  z-index:999;display:flex;align-items:center;gap:8px;
  transform:translateY(16px);opacity:0;transition:all 0.25s ease;
  pointer-events:none;
}
.toast.show{transform:none;opacity:1}
.toast-icon{color:var(--gold-light);font-size:16px}
</style>
</head>

            body: `Hi [Name], we build fully accessible websites for care providers featuring screen adjusters and direct support inquiry structures. Worth a brief look at some layouts?`
          }
        ]
      }
    }
  },
  {
    id: "Other",
    label: "Other Niches",
    sub: "General and customizable cold templates",
    icon: "✨",
    tip: "Use these general-purpose templates if your client doesn't fit into the primary niches.",
    subNiches: {
      "General Outbound": {
        tip: "A robust framework that works across any b2b trade. Simple, direct, and focused on site speed.",
        emails: [
          {
            label: "Hook — General Site Audit",
            subject: "A few things I noticed on [Business Name]'s website",
            body: `Hi [Name],

I was looking at [Business Name]'s online presence in [Area] earlier.

I noticed that your site takes quite a while to load on mobile and your core contact details are nested deep inside menu structures.

Would you be open to a 10-minute look at some of our work?

[Your name]

Driftveil Labs
[Your email]`
          }
        ],
        whatsapp: [
          {
            label: "WhatsApp — General Outbound",
            body: `Hi [Name], I noticed [Business Name]'s site loads slowly on mobile devices. We build high-speed custom sites designed to pull more local inquiries on mobile. Worth a quick look? [Your name] — driftveillabs.com`
          }
        ]
      }
    }
  }
];

let activeNiche = null;
let activeSubNiche = null;

function buildSidebar() {
  const list = document.getElementById('nicheList');
  list.innerHTML = '';
  DATA.forEach(niche => {
    const btn = document.createElement('button');
    btn.className = 'niche-btn' + (activeNiche === niche.id ? ' active' : '');
    btn.innerHTML = `
      <div class="niche-icon">${niche.icon}</div>
      <div>
        <div class="niche-label">${niche.label}</div>
        <div class="niche-sub">${niche.sub}</div>
      </div>`;
    btn.onclick = () => selectNiche(niche.id);
    list.appendChild(btn);
  });
}

function selectNiche(id) {
  activeNiche = id;
  const niche = DATA.find(n => n.id === id);
  if (niche) {
    // Select first sub-niche by default
    activeSubNiche = Object.keys(niche.subNiches)[0];
  }
  buildSidebar();
  renderApp();
}

function selectSubNiche(subName) {
  activeSubNiche = subName;
  renderApp();
}

function updateAllDrafts() {
  if (activeNiche) {
    renderApp();
  }
}

function getVariableValues() {
  return {
    senderName: document.getElementById('v_sender_name').value || "[Your Name]",
    senderRole: document.getElementById('v_sender_role').value || "[Your Role]",
    senderEmail: document.getElementById('v_sender_email').value || "info@driftveillabs.com",
    clientName: document.getElementById('v_client_name').value || "[Name]",
    clientBiz: document.getElementById('v_client_biz').value || "[Business Name]",
    clientArea: document.getElementById('v_client_area').value || "[Area]"
  };
}

function processTemplate(text, vars) {
  return text
    .replace(/\[Your name\]/g, vars.senderName)
    .replace(/\[Your Name\]/g, vars.senderName)
    .replace(/\[Your role\]/g, vars.senderRole)
    .replace(/\[Your Role\]/g, vars.senderRole)
    .replace(/\[Your email\]/g, vars.senderEmail)
    .replace(/\[Your Email\]/g, vars.senderEmail)
    .replace(/\[Name\]/g, vars.clientName)
    .replace(/\[Client Contact\]/g, vars.clientName)
    .replace(/\[Business Name\]/g, vars.clientBiz)
    .replace(/\[Client Business\]/g, vars.clientBiz)
    .replace(/\[Area\]/g, vars.clientArea)
    .replace(/\[City\]/g, vars.clientArea)
    .replace(/\[Region\]/g, vars.clientArea);
}

function renderApp() {
  const niche = DATA.find(n => n.id === activeNiche);
  if (!niche) return;

  document.getElementById('welcome').style.display = 'none';
  const out = document.getElementById('emailOutput');
  const vars = getVariableValues();

  // 1. Render Sub-Niche Pills Selector
  const subNichesList = Object.keys(niche.subNiches);
  const pillsHtml = subNichesList.map(subName => {
    const isActive = activeSubNiche === subName;
    return `<button class="subniche-pill${isActive ? ' active' : ''}" onclick="selectSubNiche('${subName}')">${subName}</button>`;
  }).join('');

  const activeSubData = niche.subNiches[activeSubNiche];
  if (!activeSubData) return;

  // 2. Render Email Cards
  const emailsHtml = activeSubData.emails.map((email, i) => {
    const renderedSubject = processTemplate(email.subject, vars);
    const renderedBody = processTemplate(email.body, vars);
    return `
      <div class="email-card">
        <div class="email-card-header">
          <div style="flex:1;min-width:0">
            <div class="email-variant-label">${email.label}</div>
            <div class="email-subject-preview">✉ ${escHtml(renderedSubject)}</div>
          </div>
          <div class="email-card-actions">
            <button class="btn btn-copy" id="copy_${activeNiche}_${i}" onclick="copyEmail(event, '${renderedSubject}', \`${escapeBackticks(renderedBody)}\`, '${activeNiche}_${i}')">Copy</button>
          </div>
        </div>
        <div class="email-body" id="body_${activeNiche}_${i}">
          <div class="email-meta-row"><span class="meta-key">To:</span><span class="meta-val">${escHtml(vars.clientName)}</span></div>
          <div class="email-meta-row"><span class="meta-key">Subject:</span><span class="meta-val">${escHtml(renderedSubject)}</span></div>
          <div class="divider"></div>
          <div class="email-text">${escHtml(renderedBody)}</div>
        </div>
      </div>
    `;
  }).join('');

  // 3. Render WhatsApp Cards
  let waHtml = '';
  if (activeSubData.whatsapp && activeSubData.whatsapp.length) {
    const wCards = activeSubData.whatsapp.map((wa, i) => {
      const renderedBody = processTemplate(wa.body, vars);
      return `
        <div class="wa-card">
          <div class="wa-card-header">
            <div style="flex:1;min-width:0">
              <div class="wa-variant-label">${wa.label}</div>
              <div class="wa-preview">💬 ${escHtml(renderedBody.split('\n')[0].slice(0, 80))}…</div>
            </div>
            <div class="email-card-actions">
              <button class="btn btn-wa" id="wa_${activeNiche}_${i}" onclick="copyWa(event, \`${escapeBackticks(renderedBody)}\`, '${activeNiche}_${i}')">Copy</button>
            </div>
          </div>
          <div class="email-body" id="wabody_${activeNiche}_${i}">
            <div class="email-text">${escHtml(renderedBody)}</div>
          </div>
        </div>
      `;
    }).join('');

    waHtml = `
      <div class="section-divider">
        <div class="section-divider-line"></div>
        <div class="section-divider-label">💬 WhatsApp Drafts</div>
        <div class="section-divider-line"></div>
      </div>
      <div class="emails-grid">${wCards}</div>
    `;
  }

  out.innerHTML = `
    <div class="email-section visible">
      <div class="section-eyebrow">${niche.icon} Niche Hub</div>
      <div class="section-title">${niche.label}</div>
      <div class="section-meta">Selected Category: <strong>${niche.label}</strong> / Sub-niche: <strong>${activeSubNiche}</strong></div>
      
      <!-- Sub-niche Pill Selectors -->
      <div class="subniche-container">
        <div class="subniche-label">Explore Sub-Niches:</div>
        <div class="subniche-pills">${pillsHtml}</div>
      </div>

      <!-- Email Drafts -->
      <div class="emails-grid">
        ${emailsHtml}
      </div>

      <!-- WhatsApp Section -->
      ${waHtml}

      <!-- Dynamic Custom Tips -->
      <div class="tip-box">
        <div class="tip-label">💡 Sending tip for ${activeSubNiche}</div>
        <div class="tip-text">${activeSubData.tip || niche.tip}</div>
      </div>
    </div>
  `;
}

// Card Expansion Triggers
document.addEventListener('click', function(e) {
  const header = e.target.closest('.email-card-header, .wa-card-header');
  if (!header) return;
  if (e.target.closest('.email-card-actions')) return;
  const card = header.parentElement;
  const body = card.querySelector('.email-body');
  if (body) body.classList.toggle('open');
});

// Clipboard Functions
function copyEmail(e, subject, body, elementId) {
  e.stopPropagation();
  const text = `Subject: ${subject}\n\n${body}`;
  
  // Clipboard Fallback compatible with sandboxed environments
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => showFeedback(elementId));
  } else {
    const textArea = document.createElement("textarea");
    textArea.value = text;
    textArea.style.position = "fixed";
    document.body.appendChild(textArea);
    textArea.focus();
    textArea.select();
    try {
      document.execCommand('copy');
      showFeedback(elementId);
    } catch (err) {
      console.error('Fallback: Oops, unable to copy', err);
    }
    document.body.removeChild(textArea);
  }
}

function copyWa(e, body, elementId) {
  e.stopPropagation();
  
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(body).then(() => showFeedback(elementId, true));
  } else {
    const textArea = document.createElement("textarea");
    textArea.value = body;
    textArea.style.position = "fixed";
    document.body.appendChild(textArea);
    textArea.focus();
    textArea.select();
    try {
      document.execCommand('copy');
      showFeedback(elementId, true);
    } catch (err) {
      console.error('Fallback: Oops, unable to copy', err);
    }
    document.body.removeChild(textArea);
  }
}

function showFeedback(elementId, isWa = false) {
  const prefix = isWa ? 'wa_' : 'copy_';
  const btn = document.getElementById(`${prefix}${elementId}`);
  if (btn) {
    btn.textContent = 'Copied ✓';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 2000);
  }
  showGlobalToast();
}

let _toastTimeout;
function showGlobalToast() {
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  clearTimeout(_toastTimeout);
  _toastTimeout = setTimeout(() => {
    toast.classList.remove('show');
  }, 2500);
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escapeBackticks(str) {
  return str.replace(/`/g, '\\`').replace(/\$/g, '\\$');
}

buildSidebar();
</script>
