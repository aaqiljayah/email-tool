let activeNiche = null;

function buildSidebar() {
  const list = document.getElementById('nicheList');
  list.innerHTML = '';
  DATA.forEach(niche => {
    const btn = document.createElement('button');
    btn.className = 'niche-btn' + (activeNiche === niche.id ? ' active' : '');
    btn.innerHTML = `
      <div class="niche-icon">${niche.icon}</div>
      <div>
        <div class="niche-label">${niche.label}</div>
        <div class="niche-sub">${niche.sub}</div>
      </div>`;
    btn.onclick = () => selectNiche(niche.id);
    list.appendChild(btn);
  });
}

function selectNiche(id) {
  activeNiche = id;
  buildSidebar();
  renderEmails(id);
}

function renderEmails(id) {
  const niche = DATA.find(n => n.id === id);
  if (!niche) return;

  document.getElementById('welcome').style.display = 'none';
  const out = document.getElementById('emailOutput');

  let cardsHtml = niche.emails.map((email, i) => `
    <div class="email-card">
      <div class="email-card-header">
        <div style="flex:1;min-width:0">
          <div class="email-variant-label">${email.label}</div>
          <div class="email-subject-preview">✉ ${email.subject}</div>
        </div>
        <div class="email-card-actions">
          <button class="btn btn-copy" id="copy_${id}_${i}" onclick="copyEmail(event, '${id}', ${i})">Copy</button>
        </div>
      </div>
      <div class="email-body" id="body_${id}_${i}">
        <div class="email-meta-row"><span class="meta-key">To:</span><span class="meta-val">${email.to}</span></div>
        <div class="email-meta-row"><span class="meta-key">Subject:</span><span class="meta-val">${email.subject}</span></div>
        <div class="divider"></div>
        <div class="email-text">${escHtml(email.body)}</div>
      </div>
    </div>
  `).join('');

  let waHtml = '';
  if (niche.whatsapp && niche.whatsapp.length) {
    const wCards = niche.whatsapp.map((wa, i) => `
      <div class="wa-card">
        <div class="wa-card-header">
          <div style="flex:1;min-width:0">
            <div class="wa-variant-label">${wa.label}</div>
            <div class="wa-preview">💬 ${wa.body.split('\n')[0].slice(0,80)}…</div>
          </div>
          <div class="email-card-actions">
            <button class="btn btn-wa" id="wa_${id}_${i}" onclick="copyWa(event, '${id}', ${i})">Copy</button>
          </div>
        </div>
        <div class="email-body" id="wabody_${id}_${i}">
          <div class="email-text">${escHtml(wa.body)}</div>
        </div>
      </div>
    `).join('');
    waHtml = `
      <div class="section-divider">
        <div class="section-divider-line"></div>
        <div class="section-divider-label">💬 WhatsApp Drafts</div>
        <div class="section-divider-line"></div>
      </div>
      <div class="emails-grid">${wCards}</div>`;
  }

  out.innerHTML = `
    <div class="email-section visible">
      <div class="section-eyebrow">${niche.icon} Niche</div>
      <div class="section-title">${niche.label}</div>
      <div class="section-meta">${niche.emails.length} email draft${niche.emails.length > 1 ? 's' : ''}${niche.whatsapp ? ' · ' + niche.whatsapp.length + ' WhatsApp draft' + (niche.whatsapp.length > 1 ? 's' : '') : ''}</div>
      <div class="emails-grid">${cardsHtml}</div>
      ${waHtml}
      <div class="tip-box">
        <div class="tip-label">💡 Sending tip</div>
        <div class="tip-text">${niche.tip}</div>
      </div>
    </div>`;
}

function toggleCard(compositeId) {
  // not used directly, handled via onclick string
}

document.addEventListener('click', function(e) {
  const header = e.target.closest('.email-card-header, .wa-card-header');
  if (!header) return;
  if (e.target.closest('.email-card-actions')) return;
  const card = header.parentElement;
  const body = card.querySelector('.email-body');
  if (body) body.classList.toggle('open');
});

function copyEmail(e, nicheId, idx) {
  e.stopPropagation();
  const niche = DATA.find(n => n.id === nicheId);
  if (!niche) return;
  const email = niche.emails[idx];
  const text = `Subject: ${email.subject}\n\n${email.body}`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(`copy_${nicheId}_${idx}`);
    if (!btn) return;
    btn.textContent = 'Copied ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function copyWa(e, nicheId, idx) {
  e.stopPropagation();
  const niche = DATA.find(n => n.id === nicheId);
  if (!niche || !niche.whatsapp) return;
  const wa = niche.whatsapp[idx];
  navigator.clipboard.writeText(wa.body).then(() => {
    const btn = document.getElementById(`wa_${nicheId}_${idx}`);
    if (!btn) return;
    btn.textContent = 'Copied ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

buildSidebar();
</script>
